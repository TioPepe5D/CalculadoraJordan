function tBtn(t,ico,nom,extra){return '<button class="tema-btn '+(extra||'')+'" onclick="setTema(\''+t+'\',this,\''+nom+'\')"><span class="ico">'+ico+'</span><span class="nom">'+nom+'</span></button>';}
function toggleCajon(){cajon=!cajon;var p=document.getElementById('tPanel'),b=document.getElementById('btnT');if(p)p.classList.toggle('abierto',cajon);if(b)b.textContent=(cajon?'▴':'▾')+' Tema';}
function setTema(t,btn,lbl){
  document.body.setAttribute('data-theme',t);
  document.querySelectorAll('.tema-btn').forEach(function(b){b.classList.remove('activo');});
  btn.classList.add('activo');
  var n=document.getElementById('nTema');if(n)n.textContent=lbl;
  cajon=false;var p=document.getElementById('tPanel'),b=document.getElementById('btnT');
  if(p)p.classList.remove('abierto');if(b)b.textContent='▾ Tema';
  try{localStorage.setItem(TK,t);localStorage.setItem(TKL,lbl);}catch(e){}
}
function restTema(){
  try{
    var t=localStorage.getItem(TK),l=localStorage.getItem(TKL);
    if(!t)return;
    document.body.setAttribute('data-theme',t);
    var n=document.getElementById('nTema');if(n&&l)n.textContent=l;
    var btns=document.querySelectorAll('.tema-btn');
    var temas=['aravena','galaxia','dorada','oceano','amira','tecnologia','bosque','artico','atardecer','jardin','minimal'];
    var i=temas.indexOf(t);if(i>=0&&btns[i])btns[i].classList.add('activo');
  }catch(e){}
}

  return '<div class="cat"><div class="cat-h"><div class="cat-n">'+emoji+' '+nom+'</div><div class="cat-p" id="p-'+cat+'">$'+p1.toLocaleString('es-CL')+'/gr</div></div>'+

    '<div><div class="cat-l">$ por gramo</div><div class="precio-btns">'+
      '<button class="precio-btn activo" data-cat="'+cat+'" onclick="setP(\''+cat+'\','+p1+',this)">$'+p1.toLocaleString('es-CL')+'</button>'+

function setP(cat,val,btn){
  var pgr=document.querySelector('.cat-pgr[data-cat="'+cat+'"]');if(pgr)pgr.value=val;
  document.querySelectorAll('.precio-btn[data-cat="'+cat+'"]').forEach(function(b){b.classList.remove('activo');});
  btn.classList.add('activo');
  var p=document.getElementById('p-'+cat);if(p)p.textContent='$'+val.toLocaleString('es-CL')+'/gr';
  calcular();
}

function addIns(){
  var d=(document.getElementById('iDesc').value||'').trim();
  var c=parseFloat(document.getElementById('iCosto').value)||0;
  if(!d){toast('Ingresa una descripción');return;}
  if(c<=0){toast('Ingresa un costo válido');return;}
  ins.push({desc:d,costo:c});
  document.getElementById('iDesc').value='';document.getElementById('iCosto').value='';
  renderIns();calcular();
}
function qIns(i){ins.splice(i,1);renderIns();calcular();}
function renderIns(){
  var el=document.getElementById('iLista');if(!el)return;
  if(!ins.length){el.innerHTML='<p class="sin-insumos">Sin insumos agregados.</p>';return;}
  el.innerHTML=ins.map(function(x,i){
    return '<div class="ins-fila"><span class="ins-desc">'+x.desc+'</span><span class="ins-cost">'+fmt(x.costo)+'</span><button class="btn-quitar" onclick="qIns('+i+')">✕</button></div>';
  }).join('');
}

function fmt(n){return '$'+Math.round(n).toLocaleString('es-CL');}

function calcular(){
  var costoOro=0,lineas=[];
  document.querySelectorAll('.cat-gr').forEach(function(input){
    var cat=input.dataset.cat,gr=parseFloat(input.value)||0;
    var pE=document.querySelector('.cat-pgr[data-cat="'+cat+'"]'),pgr=pE?(parseFloat(pE.value)||0):0;
    var pel=document.getElementById('p-'+cat);if(pel)pel.textContent=pgr>0?fmt(pgr)+'/gr':'$0/gr';
    if(gr>0&&pgr>0){costoOro+=gr*pgr;lineas.push({cat:cat,gr:gr,pgr:pgr});}
  });
  var costoIns=ins.reduce(function(a,b){return a+b.costo;},0);
  var totalC=costoOro+costoIns+1000;
  var venta=parseFloat((document.getElementById('vTotal')||{}).value)||0;
  var util=venta-totalC;
  var ownerAmt=util*(PCT_A/100),diegoAmt=util*(PCT_D/100);
  var rv=document.getElementById('rV');if(rv)rv.textContent=fmt(venta);
  var rc=document.getElementById('rC');if(rc)rc.textContent=fmt(totalC);
  var ru=document.getElementById('rU');if(ru){ru.textContent=(util>=0?'':'−')+fmt(Math.abs(util));ru.style.color=util>=0?'var(--ok)':'var(--er)';}
  var rd=document.getElementById('rD');if(rd)rd.textContent=fmt(Math.max(0,ownerAmt));
  var rvl=document.getElementById('rVl');if(rvl)rvl.textContent=fmt(Math.max(0,diegoAmt));
  var por=(document.getElementById('vPor')||{}).value||'';
  var cli=((document.getElementById('vCliente')||{}).value||'').trim()||'—';
  var msg='Venta Por '+por+'\nNombre: '+cli+'\n\n';
  lineas.forEach(function(l){msg+=l.gr+' | '+EN[l.cat]+' '+(EE[l.cat]||'')+'\n';});
  ins.forEach(function(x){msg+=fmt(x.costo)+' | '+x.desc+' 💎\n';});
  if(venta>0)msg+='\nVenta: '+fmt(venta);
  var mb=document.getElementById('mBox');if(mb)mb.textContent=msg;
}

function copiarMsg(){
  var t=(document.getElementById('mBox')||{}).textContent||'';
  navigator.clipboard.writeText(t).then(function(){toast('¡Mensaje copiado!');}).catch(function(){toast('No se pudo copiar');});
}

function _resetForm(){
  document.querySelectorAll('input[type="number"],input[type="text"]').forEach(function(el){el.value='';});
  var def={Cadena:450,Micro:650,Italy:2000,GF18K:1400};
  Object.keys(def).forEach(function(cat){
    var pgr=document.querySelector('.cat-pgr[data-cat="'+cat+'"]');if(pgr)pgr.value=def[cat];
    document.querySelectorAll('.precio-btn[data-cat="'+cat+'"]').forEach(function(b){b.classList.remove('activo');});
    var btns=document.querySelectorAll('.precio-btn[data-cat="'+cat+'"]');if(btns.length)btns[0].classList.add('activo');
    var pel=document.getElementById('p-'+cat);if(pel)pel.textContent='$'+def[cat].toLocaleString('es-CL')+'/gr';
  });
  var vp=document.getElementById('vPor');if(vp)vp.selectedIndex=0;
  ins=[];renderIns();calcular();
}
function limpiar(){if(!confirm('¿Limpiar todos los datos?'))return;_resetForm();}

function guardarVenta(){
  var venta=parseFloat((document.getElementById('vTotal')||{}).value)||0;
  var cliente=((document.getElementById('vCliente')||{}).value||'').trim();
  if(venta<=0){toast('Ingresa el total de venta primero');return;}
  if(!cliente){toast('Ingresa el nombre del cliente');return;}
  var costoOro=0,lineas=[];
  document.querySelectorAll('.cat-gr').forEach(function(input){
    var cat=input.dataset.cat,gr=parseFloat(input.value)||0;
    var pE=document.querySelector('.cat-pgr[data-cat="'+cat+'"]'),pgr=pE?(parseFloat(pE.value)||0):0;
    if(gr>0&&pgr>0){costoOro+=gr*pgr;lineas.push({cat:cat,gr:gr,pgr:pgr});}
  });
  var costoIns=ins.reduce(function(a,b){return a+b.costo;},0);
  var totalC=costoOro+costoIns+1000,util=venta-totalC;
  var ahora=new Date();
  var reg={
    id:'v_'+Date.now(),at:Date.now(),
    fecha:ahora.toLocaleDateString('es-CL',{day:'2-digit',month:'short'}),
    hora:ahora.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}),
    cliente:cliente,
    ventaPor:(document.getElementById('vPor')||{}).value||'',
    lineas:lineas,insumos:ins.slice(),
    totalVenta:venta,utilidad:util,
    ownerAmt:util*(PCT_A/100),diegoAmt:util*(PCT_D/100),
    ownerPct:PCT_A,diegoPct:PCT_D,ownerName:OWNER,

  };

  if(!confirm('¿Eliminar esta venta?'))return;
  lsDel(id);ventas=lsGet();
  if(tab==='historial')renderH();
  if(tab==='reportes')renderRep();
  toast('Eliminada');
}

  navigator.clipboard.writeText(v.mensaje||'').then(function(){toast('¡Copiado!');}).catch(function(){toast('No se pudo copiar');});

function showTab(t){
  tab=t;
  ['Venta','Historial','Reportes'].forEach(function(x){var b=document.getElementById('tab'+x);if(b)b.classList.toggle('activo',t===x.toLowerCase());});
  document.getElementById('sVenta').style.display    =t==='venta'    ?'':'none';
  document.getElementById('sHistorial').style.display=t==='historial'?'':'none';
  document.getElementById('sReportes').style.display =t==='reportes' ?'':'none';
  if(t==='historial')renderH();if(t==='reportes')renderRep();
}

function mesKey(at){var d=new Date(at);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function setHPer(p){
  hPer=p;
  if(p==='hoy')hDia=todayStr();
  else if(p==='sem')hSem=todayStr();
  else if(p==='mes')hMes=curMonthStr();
  else if(p==='ano')hAno=String(new Date().getFullYear());
  renderH();
}

function hFiltrar(){
  if(hPer==='todo')return ventas;
  return ventas.filter(function(v){
    if(!v.at)return false;
    var vd=new Date(v.at);
    if(hPer==='hoy')return vd.getFullYear()+'-'+String(vd.getMonth()+1).padStart(2,'0')+'-'+String(vd.getDate()).padStart(2,'0')===hDia;
    if(hPer==='sem'){
      var sd=new Date(hSem+'T12:00:00');
      var dow=(sd.getDay()+6)%7;
      var mon=new Date(sd);mon.setDate(sd.getDate()-dow);mon.setHours(0,0,0,0);
      var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
      return v.at>=mon.getTime()&&v.at<=sun.getTime();
    }
    if(hPer==='mes')return mesKey(v.at)===hMes;
    if(hPer==='ano')return String(vd.getFullYear())===hAno;
    return true;
  });
}

function renderH(){
  var el=document.getElementById('sHistorial');if(!el)return;
  var periodos=[{k:'hoy',ico:'☀️',lbl:'Hoy'},{k:'sem',ico:'📅',lbl:'Semana'},{k:'mes',ico:'🗓',lbl:'Mes'},{k:'ano',ico:'📆',lbl:'Año'},{k:'todo',ico:'∞',lbl:'Todo'}];
  var sub='';
  if(hPer==='hoy'){
    sub='<div class="mes-lbl">Seleccionar día</div><input type="date" class="mes-select" value="'+hDia+'" onchange="hDia=this.value;renderHLista()">';
  } else if(hPer==='sem'){
    sub='<div class="mes-lbl">Seleccionar cualquier día de la semana</div><input type="date" class="mes-select" value="'+hSem+'" onchange="hSem=this.value;renderHLista()">';
  } else if(hPer==='mes'){
    sub='<div class="mes-lbl">Seleccionar mes</div><input type="month" class="mes-select" value="'+hMes+'" onchange="hMes=this.value;renderHLista()">';
  } else if(hPer==='ano'){
    var yrs={};ventas.forEach(function(v){if(v.at)yrs[new Date(v.at).getFullYear()]=1;});
    yrs[new Date().getFullYear()]=1;
    var opts=Object.keys(yrs).sort().reverse().map(function(y){return '<option value="'+y+'"'+(hAno===String(y)?' selected':'')+'>'+y+'</option>';}).join('');
    sub='<div class="mes-lbl">Seleccionar año</div><select class="mes-select" onchange="hAno=this.value;renderHLista()">'+opts+'</select>';
  }
  el.innerHTML=
    '<div class="per-tabs">'+
      periodos.map(function(p){return '<button class="per-tab '+(hPer===p.k?'activo':'')+'" onclick="setHPer(\''+p.k+'\')">'+p.ico+'<br>'+p.lbl+'</button>';}).join('')+
    '</div>'+sub+
    '<div id="hResumen"></div>'+
    '<button class="btn-excel" onclick="descargarExcel()">📥 Descargar en Excel</button>'+
    '<div class="search-wrap"><span class="search-ico">🔍</span>'+
      '<input class="search-box" type="text" id="hBus" placeholder="Buscar por cliente..." oninput="renderHLista()">'+
    '</div>'+
    '<div id="hLista"></div>';
  renderHLista();
}

function renderHLista(){
  var q=((document.getElementById('hBus')||{}).value||'').toLowerCase();
  var hBase=hFiltrar();
  var h=q?hBase.filter(function(v){return(v.cliente||'').toLowerCase().includes(q)||(v.ventaPor||'').toLowerCase().includes(q);}):hBase;
  var tOwner=0,tDiego=0;
  hBase.forEach(function(v){tOwner+=v.ownerAmt||0;tDiego+=v.diegoAmt||0;});
  var cols=PCT_D>0?'1fr 1fr 1fr':'1fr 1fr';
  var res=document.getElementById('hResumen');
  if(res){
    var rh='<div class="htotal-resumen" style="grid-template-columns:'+cols+'">'+
      '<div class="htotal-item"><div class="val">'+hBase.length+'</div><div class="lbl">Ventas</div></div>'+
      '<div class="htotal-item"><div class="val">'+fmt(Math.max(0,tOwner))+'</div><div class="lbl">'+OWNER+'</div></div>'+
      (PCT_D>0?'<div class="htotal-item"><div class="val">'+fmt(Math.max(0,tDiego))+'</div><div class="lbl">Diego</div></div>':'')+
      '</div>';
    res.innerHTML=rh;
  }
  var lista=document.getElementById('hLista');if(!lista)return;
  var sinMsg={hoy:'ese día',sem:'esa semana',mes:'ese mes',ano:'ese año',todo:''};
  lista.innerHTML=h.length===0?'<div class="sin-historial">Sin ventas '+(sinMsg[hPer]||'')+'</div>':
    h.map(function(v){
      var det=(v.lineas||[]).map(function(l){return l.gr+'g '+(EN[l.cat]||l.cat)+' '+(EE[l.cat]||'');}).join(' · ');
      if(v.insumos&&v.insumos.length)det+=' · '+v.insumos.map(function(i){return i.desc+' 💎 '+fmt(i.costo);}).join(' · ');
      return '<div class="hventa">'+
        '<div class="hventa-top"><div class="hventa-nombre">'+(v.cliente||'—')+'</div><div class="hventa-fecha">'+(v.fecha||'')+' · '+(v.hora||'')+'</div></div>'+
        '<div class="hventa-meta">Venta por <strong>'+(v.ventaPor||'—')+'</strong></div>'+
        '<div class="hventa-detalle">'+(det||'—')+'</div>'+
        '<div class="hventa-bottom">'+
          '<div><div class="hventa-clp">CLP</div><div class="hventa-total">'+fmt(v.totalVenta||0)+'</div><div class="hventa-badge">'+(v.ventaPor||'')+'</div></div>'+
          '<div class="hventa-acc">'+
            '<button class="hbtn" onclick="copiarMsgH(\''+v.id+'\')" title="Copiar">💬</button>'+
            '<button class="hbtn danger" onclick="eliminarVenta(\''+v.id+'\')" title="Eliminar">🗑</button>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
}

function descargarExcel(){
  var lista=hFiltrar();
  if(!lista.length){toast('Sin datos para exportar');return;}
  var cols=['Fecha','Hora','Cadena (gr)','Micro (gr)','Italy (gr)','GF 18K (gr)','Insumos ($)','Total Venta ($)',OWNER+' ('+PCT_A+'%)'];
  if(PCT_D>0)cols.push('Diego ('+PCT_D+'%)');
  var filas=lista.map(function(v){
    var gr={Cadena:0,Micro:0,Italy:0,GF18K:0};
    (v.lineas||[]).forEach(function(l){if(gr[l.cat]!==undefined)gr[l.cat]=l.gr;});
    function nc(n){return String(n||0).replace('.',',');}
    var costoIns=(v.insumos||[]).reduce(function(s,i){return s+(i.costo||0);},0);
    var row=[v.fecha||'',v.hora||'',nc(gr.Cadena),nc(gr.Micro),nc(gr.Italy),nc(gr.GF18K),nc(costoIns),nc(v.totalVenta||0),nc(Math.max(0,v.ownerAmt||0))];
    if(PCT_D>0)row.push(nc(Math.max(0,v.diegoAmt||0)));
    return row;
  });
  function esc(val){var s=String(val===null||val===undefined?'':val);return(s.includes(';')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}
  var csv='﻿'+cols.map(esc).join(';')+'\n';
  filas.forEach(function(r){csv+=r.map(esc).join(';')+'\n';});
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var hoy=new Date().toLocaleDateString('es-CL').replace(/\//g,'-');
  var sufijo=hPer==='todo'?hoy:hPer==='hoy'?hDia:hPer==='sem'?hSem:hPer==='mes'?hMes:hAno;
  a.href=url;a.download=OWNER+'_Ventas_'+sufijo+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  toast('✓ Archivo descargado');
}

function setRepPer(p){repPer=p;renderRep();}

function renderRep(){
  var el=document.getElementById('sReportes');if(!el)return;
  function startOf(per){
    var d=new Date();
    if(per==='dia'){d.setHours(0,0,0,0);}
    else if(per==='sem'){var day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d=new Date(d.setDate(diff));d.setHours(0,0,0,0);}
    else if(per==='mes'){d=new Date(d.getFullYear(),d.getMonth(),1);}
    else{d=new Date(d.getFullYear(),0,1);}
    return d.getTime();
  }
  function filtrar(per){var desde=startOf(per);return ventas.filter(function(v){return(v.at||0)>=desde;});}
  function stats(h){
    var tV=0,tU=0,tOwner=0,tDiego=0;
    h.forEach(function(v){tV+=v.totalVenta||0;tU+=v.utilidad||0;tOwner+=v.ownerAmt||0;tDiego+=v.diegoAmt||0;});
    return{tV:tV,tU:tU,tOwner:tOwner,tDiego:tDiego,tC:Math.max(0,tV-tU),cnt:h.length};
  }
  var periodos=[{k:'dia',ico:'☀️',lbl:'Hoy'},{k:'sem',ico:'📅',lbl:'Semana'},{k:'mes',ico:'🗓',lbl:'Mes'},{k:'ano',ico:'📆',lbl:'Año'}];
  var titulos={dia:'Hoy',sem:'Esta Semana',mes:'Este Mes',ano:'Este Año'};
  var h=filtrar(repPer),s=stats(h);
  var splitRows='<div class="reporte-fila"><span class="reporte-lbl">Utilidad '+OWNER+' ('+PCT_A+'%)</span><span class="reporte-val gold">'+fmt(Math.max(0,s.tOwner))+'</span></div>';
  if(PCT_D>0)splitRows+='<div class="reporte-fila"><span class="reporte-lbl">Utilidad Diego ('+PCT_D+'%)</span><span class="reporte-val gold">'+fmt(Math.max(0,s.tDiego))+'</span></div>';
  el.innerHTML=
    '<div class="per-tabs">'+
      periodos.map(function(p){return '<button class="per-tab '+(repPer===p.k?'activo':'')+'" onclick="setRepPer(\''+p.k+'\')">'+p.ico+'<br>'+p.lbl+'</button>';}).join('')+
    '</div>'+
    '<div class="rep-resumen">'+
      '<div class="rep-mini"><div class="v">'+s.cnt+'</div><div class="l">Ventas</div></div>'+
      '<div class="rep-mini"><div class="v">'+fmt(s.tV)+'</div><div class="l">Total Ventas</div></div>'+
      '<div class="rep-mini"><div class="v">'+fmt(s.tC)+'</div><div class="l">Costos</div></div>'+
      '<div class="rep-mini"><div class="v" style="color:'+(s.tU>=0?'var(--ok)':'var(--er)')+'">'+fmt(s.tU)+'</div><div class="l">Utilidad</div></div>'+
    '</div>'+
    '<div class="reporte-card"><div class="reporte-t">📊 '+titulos[repPer]+'</div>'+
      '<div class="reporte-fila"><span class="reporte-lbl">Ventas totales</span><span class="reporte-val gold">'+fmt(s.tV)+'</span></div>'+
      '<div class="reporte-fila"><span class="reporte-lbl">Costo total (oro + insumos)</span><span class="reporte-val">'+fmt(s.tC)+'</span></div>'+
      '<div class="reporte-fila"><span class="reporte-lbl">Utilidad bruta</span><span class="reporte-val" style="color:'+(s.tU>=0?'var(--ok)':'var(--er)')+'">'+fmt(s.tU)+'</span></div>'+
      '<div style="border-top:2px solid var(--bd2);margin-top:4px;padding-top:4px">'+splitRows+'</div>'+
      (s.cnt===0?'<div class="hrep-none" style="text-align:center;padding:12px">Sin ventas en este período</div>':'')+
    '</div>';
}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function toastOk(msg){var o=document.getElementById('toastOk'),tx=document.getElementById('toastOkTxt');if(!o)return;tx.textContent=msg||'¡Guardado!';o.classList.add('show');setTimeout(function(){o.classList.remove('show');},2000);}

renderApp();

document.addEventListener('input',function(e){
  if(e.target.matches('input[type="number"],input[type="text"],select'))calcular();
});
</script>
